# ── Server ──────────────────────────────────────────────
server.port=8080

# ── Database (Supabase PostgreSQL) ───────────────────────
# Set these via environment variables — never hardcode
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USER}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Claude API ───────────────────────────────────────────
claude.api.key=${CLAUDE_API_KEY:}
claude.api.model=claude-sonnet-4-20250514
claude.api.base-url=https://api.anthropic.com

# ── JWT ──────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:kontrol-dev-secret-change-in-production}
jwt.expiration-hours=${JWT_EXPIRATION_HOURS:24}

# ── CORS ─────────────────────────────────────────────────
# Cloudflare Pages domain — set via env var
cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# ── Scheduling ───────────────────────────────────────────
spring.task.scheduling.enabled=true

# ── Platform API keys (all via env vars) ─────────────────
# Instagram / Facebook (Meta Graph API)
meta.app.id=${META_APP_ID:}
meta.app.secret=${META_APP_SECRET:}

# TikTok
tiktok.client.key=${TIKTOK_CLIENT_KEY:}
tiktok.client.secret=${TIKTOK_CLIENT_SECRET:}

# LinkedIn
linkedin.client.id=${LINKEDIN_CLIENT_ID:}
linkedin.client.secret=${LINKEDIN_CLIENT_SECRET:}

# Reddit
reddit.client.id=${REDDIT_CLIENT_ID:}
reddit.client.secret=${REDDIT_CLIENT_SECRET:}
reddit.username=${REDDIT_USERNAME:}
reddit.password=${REDDIT_PASSWORD:}

# X / Twitter
twitter.api.key=${TWITTER_API_KEY:}
twitter.api.secret=${TWITTER_API_SECRET:}
twitter.access.token=${TWITTER_ACCESS_TOKEN:}
twitter.access.secret=${TWITTER_ACCESS_SECRET:}

# YouTube
youtube.api.key=${YOUTUBE_API_KEY:}
youtube.client.id=${YOUTUBE_CLIENT_ID:}
youtube.client.secret=${YOUTUBE_CLIENT_SECRET:}
youtube.refresh.token=${YOUTUBE_REFRESH_TOKEN:}

# Steam
steam.partner.key=${STEAM_PARTNER_KEY:}
steam.app.id=${STEAM_APP_ID:}

# itch.io
itchio.api.key=${ITCHIO_API_KEY:}
itchio.game.id=${ITCHIO_GAME_ID:}

# Game Jolt
gamejolt.api.key=${GAMEJOLT_API_KEY:}
gamejolt.game.id=${GAMEJOLT_GAME_ID:}

# ── Supabase Storage ─────────────────────────────────────
supabase.url=${SUPABASE_URL:}
supabase.anon-key=${SUPABASE_ANON_KEY:}

# ── PWA Push Notifications ────────────────────────────────
vapid.public.key=${VAPID_PUBLIC_KEY:}
vapid.private.key=${VAPID_PRIVATE_KEY:}

# ── Jackson ───────────────────────────────────────────────
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.default-property-inclusion=NON_NULL

# ── Logging ───────────────────────────────────────────────
logging.level.com.kontrol=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN

# ── Scheduler thread pool ──────────────────────────────────
spring.task.scheduling.pool.size=5

# ── Multipart file upload ────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=55MB

# ── Image Generation (Replicate FLUX) ────────────────────────────────
replicate.api.key=${REPLICATE_API_KEY:}

# ── Ad Campaigns (Meta Marketing API) ────────────────────────────────
meta.ad.account.id=${META_AD_ACCOUNT_ID:}

# ── OAuth Redirect URIs ──────────────────────────────────
# Update the host/port for production deployment (Render URL)
# These are passed to each platform's developer portal as the authorized redirect URI

# Meta (Instagram + Facebook) — same OAuth app covers both
meta.redirect-uri=${INSTAGRAM_REDIRECT_URI:http://localhost:8080/api/v1/oauth/instagram/callback}
meta.fb-redirect-uri=${FACEBOOK_REDIRECT_URI:http://localhost:8080/api/v1/oauth/facebook/callback}

# TikTok
tiktok.redirect-uri=${TIKTOK_REDIRECT_URI:http://localhost:8080/api/v1/oauth/tiktok/callback}

# LinkedIn
linkedin.redirect-uri=${LINKEDIN_REDIRECT_URI:http://localhost:8080/api/v1/oauth/linkedin/callback}

# Reddit
reddit.redirect-uri=${REDDIT_REDIRECT_URI:http://localhost:8080/api/v1/oauth/reddit/callback}

# X / Twitter — OAuth 2.0 (PKCE)
twitter.oauth2.client-id=${TWITTER_CLIENT_ID:}
twitter.oauth2.client-secret=${TWITTER_CLIENT_SECRET:}
twitter.redirect-uri=${TWITTER_REDIRECT_URI:http://localhost:8080/api/v1/oauth/twitter/callback}

# YouTube / Google
youtube.redirect-uri=${YOUTUBE_REDIRECT_URI:http://localhost:8080/api/v1/oauth/youtube/callback}
